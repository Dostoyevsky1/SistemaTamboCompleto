<!DOCTYPE html>
<html class="dark" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Sistema Tambo</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-background": "#e5e2e1",
                        "outline-variant": "#4c4353",
                        "primary-container": "#7b2cbf",
                        "secondary-container": "#ffc300",
                        "primary": "#deb7ff",
                        "on-primary": "#4a007f",
                        "surface": "#131313",
                        "surface-container": "#201f1f",
                        "background": "#0e0e0e",
                        "error": "#ffb4ab",
                        "on-surface": "#e5e2e1",
                        "on-surface-variant": "#cfc2d5"
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #0e0e0e;
            color: #e5e2e1;
            font-family: 'Hanken Grotesk', sans-serif;
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #2D2D2D;
            border-radius: 10px;
        }
    </style>
</head>
<body class="overflow-hidden h-screen bg-[#0e0e0e] text-sm">

    <div id="login-container" class="flex items-center justify-center min-h-screen bg-[#0e0e0e] px-4">
        <div class="w-full max-w-md bg-surface-container border border-outline-variant p-8 rounded-xl shadow-2xl space-y-6">
            <div class="text-center">
                <h1 class="text-3xl font-extrabold text-primary tracking-tight">Sistema Tambo</h1>
                <p class="text-on-surface-variant mt-2 text-xs">Gestión Simplificada de Inventario y Pedidos</p>
            </div>
            <div id="login-error-alert" class="hidden p-3 bg-red-950/20 border border-red-500/50 rounded text-red-200 text-xs">
                Credenciales incorrectas. Inténtalo de nuevo.
            </div>
            <form id="login-form" class="space-y-4">
                <div>
                    <label class="block text-xs font-bold uppercase tracking-widest text-on-surface-variant mb-2">Usuario</label>
                    <input type="text" id="login-username" required class="w-full bg-[#161616] border border-outline-variant rounded-lg px-4 py-2 text-on-surface focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary transition-all" placeholder="Ej: admin o empleado"/>
                </div>
                <div>
                    <label class="block text-xs font-bold uppercase tracking-widest text-on-surface-variant mb-2">Contraseña</label>
                    <input type="password" id="login-password" required class="w-full bg-[#161616] border border-outline-variant rounded-lg px-4 py-2 text-on-surface focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary transition-all" placeholder="••••••••"/>
                </div>
                <button type="submit" class="w-full bg-primary text-on-primary py-2.5 rounded-lg font-bold hover:opacity-90 active:scale-98 transition-all">
                    Iniciar Sesión
                </button>
            </form>
        </div>
    </div>

    <div id="app-container" class="hidden flex h-screen overflow-hidden">
        
        <!-- SIDEBAR DE NAVEGACIÓN -->
        <aside class="w-[260px] bg-surface border-r border-outline-variant flex flex-col py-6 z-50">
            <div class="px-6 mb-8">
                <h1 class="text-2xl font-bold text-primary tracking-tight">Sistema Tambo</h1>
                <p class="text-on-surface-variant opacity-70 text-xs">Panel Operativo</p>
            </div>
            <nav id="nav-links" class="flex-1 space-y-1">
                <a href="#" data-view="productos" class="nav-item flex items-center gap-3 px-6 py-3 text-primary bg-primary-container/10 border-r-2 border-primary transition-all duration-200">
                    <span class="material-symbols-outlined">inventory_2</span>
                    <span>Productos</span>
                </a>
                <a href="#" data-view="pedidos" class="nav-item flex items-center gap-3 px-6 py-3 text-on-surface-variant hover:bg-surface-container/50 transition-colors">
                    <span class="material-symbols-outlined">shopping_cart</span>
                    <span>Pedidos</span>
                </a>
                <a href="#" data-view="usuarios" id="nav-usuarios" style="display: none;" class="nav-item flex items-center gap-3 px-6 py-3 text-on-surface-variant hover:bg-surface-container/50 transition-colors">
                    <span class="material-symbols-outlined">group</span>
                    <span>Usuarios (Admin)</span>
                </a>
            </nav>
            <div class="px-6 mt-auto pt-6 border-t border-outline-variant/30 space-y-3">
                <div class="flex items-center gap-3 p-2 rounded">
                    <div class="w-8 h-8 rounded-full bg-primary/20 flex items-center justify-center text-primary font-bold" id="user-avatar-text">U</div>
                    <div>
                        <p class="font-bold text-on-surface text-xs" id="user-display-name">Usuario</p>
                        <p class="text-[10px] text-on-surface-variant" id="user-display-role">Rol</p>
                    </div>
                </div>
                <button id="logout-btn" class="w-full flex items-center justify-center gap-2 py-2 border border-outline-variant/50 rounded text-xs text-error hover:bg-error/10 transition-colors">
                    <span class="material-symbols-outlined text-sm">logout</span> Cerrar Sesión
                </button>
            </div>
        </aside>

        <div class="flex-1 flex flex-col overflow-hidden bg-background">
            
            <header class="flex justify-between items-center h-16 px-8 bg-surface border-b border-outline-variant sticky top-0 z-40">
                <div id="search-container" class="flex items-center flex-1 max-w-md">
                    <div class="relative w-full">
                        <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant text-[20px]">search</span>
                        <input id="global-search" oninput="realizarBusqueda(this.value)" class="w-full bg-surface-container border-none rounded-lg pl-10 pr-4 py-1.5 text-xs focus:ring-1 focus:ring-primary placeholder-on-surface-variant/50 transition-all text-on-surface" placeholder="Buscar productos por nombre..."/>
                    </div>
                </div>
                <div class="flex items-center gap-4">
                </div>
            </header>

            <main class="flex-1 overflow-y-auto p-8 custom-scrollbar" id="view-port">
            </main>
        </div>
    </div>

    <div id="modal-container" class="hidden fixed inset-0 bg-black/85 backdrop-blur-sm z-50 flex items-center justify-center p-4">
    </div>

    <script>
        const API_URL = "";

        localStorage.removeItem("jwt_token");
        localStorage.removeItem("jwt_username");
        localStorage.removeItem("jwt_nombre");
        localStorage.removeItem("jwt_roles");

        const state = {
            token: sessionStorage.getItem("jwt_token") || null,
            username: sessionStorage.getItem("jwt_username") || null,
            nombre: sessionStorage.getItem("jwt_nombre") || null,
            roles: JSON.parse(sessionStorage.getItem("jwt_roles")) || [],
            currentView: "productos",
            productos: [],
            pedidos: [],
            usuarios: []
        };

        function getHeaders() {
            return {
                "Content-Type": "application/json",
                "Authorization": `Bearer ${state.token}`
            };
        }

        document.addEventListener("DOMContentLoaded", () => {
            initEvents();
            checkAuth();
        });

        function checkAuth() {
            if (state.token) {
                document.getElementById("login-container").classList.add("hidden");
                document.getElementById("app-container").classList.remove("hidden");
                document.getElementById("user-display-name").innerText = state.nombre;
                document.getElementById("user-display-role").innerText = state.roles.includes("ROLE_ADMIN") ? "Administrador" : "Empleado";
                document.getElementById("user-avatar-text").innerText = state.nombre.charAt(0).toUpperCase();

                if (state.roles.includes("ROLE_ADMIN")) {
                    document.getElementById("nav-usuarios").style.display = "flex";
                } else {
                    document.getElementById("nav-usuarios").style.display = "none";
                }

                renderView(state.currentView);
            } else {
                document.getElementById("login-container").classList.remove("hidden");
                document.getElementById("app-container").classList.add("hidden");
            }
        }

        function initEvents() {
            document.getElementById("login-form").addEventListener("submit", async (e) => {
                e.preventDefault();
                const username = document.getElementById("login-username").value;
                const password = document.getElementById("login-password").value;
                document.getElementById("login-error-alert").classList.add("hidden");

                try {
                    const response = await fetch(`${API_URL}/api/auth/login`, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ username, password })
                    });

                    if (response.ok) {
                        const data = await response.json();
                        state.token = data.token;
                        state.username = data.username;
                        state.nombre = data.nombre;
                        state.roles = data.roles;

                        sessionStorage.setItem("jwt_token", data.token);
                        sessionStorage.setItem("jwt_username", data.username);
                        sessionStorage.setItem("jwt_nombre", data.nombre);
                        sessionStorage.setItem("jwt_roles", JSON.stringify(data.roles));

                        checkAuth();
                    } else {
                        document.getElementById("login-error-alert").classList.remove("hidden");
                    }
                } catch (err) {
                    document.getElementById("login-error-alert").classList.remove("hidden");
                }
            });

            document.getElementById("logout-btn").addEventListener("click", () => {
                state.token = null;
                state.username = null;
                state.nombre = null;
                state.roles = [];
                state.currentView = "productos";

                sessionStorage.removeItem("jwt_token");
                sessionStorage.removeItem("jwt_username");
                sessionStorage.removeItem("jwt_nombre");
                sessionStorage.removeItem("jwt_roles");

                checkAuth();
            });

            document.querySelectorAll("#nav-links a").forEach(link => {
                link.addEventListener("click", (e) => {
                    e.preventDefault();
                    const view = link.getAttribute("data-view");

                    document.querySelectorAll("#nav-links a").forEach(item => {
                        item.className = "nav-item flex items-center gap-3 px-6 py-3 text-on-surface-variant hover:bg-surface-container/50 transition-colors";
                    });
                    link.className = "nav-item flex items-center gap-3 px-6 py-3 text-primary bg-primary-container/10 border-r-2 border-primary transition-all duration-200";

                    state.currentView = view;
                    renderView(view);
                });
            });
        }

        async function renderView(view) {
            if (view === "usuarios" && !state.roles.includes("ROLE_ADMIN")) {
                state.currentView = "productos";
                renderView("productos");
                return;
            }

            const searchContainer = document.getElementById("search-container");
            if (searchContainer) {
                if (view === "productos") {
                    searchContainer.style.display = "flex";
                } else {
                    searchContainer.style.display = "none";
                    const globalSearch = document.getElementById("global-search");
                    if (globalSearch) globalSearch.value = "";
                }
            }

            const viewport = document.getElementById("view-port");
            viewport.innerHTML = `<div class="flex items-center justify-center h-64"><div class="animate-spin rounded-full h-8 w-8 border-b-2 border-primary"></div></div>`;

            if (view === "productos") {
                await renderProductos(viewport);
            } else if (view === "pedidos") {
                await renderPedidos(viewport);
            } else if (view === "usuarios") {
                await renderUsuarios(viewport);
            }
        }

        async function renderProductos(container) {
            try {
                const res = await fetch(`${API_URL}/api/productos`, { headers: getHeaders() });
                state.productos = res.ok ? await res.json() : [];

                const isAdmin = state.roles.includes("ROLE_ADMIN");

                container.innerHTML = `
                    <div class="max-w-6xl mx-auto space-y-6">
                        <div class="flex justify-between items-center">
                            <div>
                                <h2 class="text-2xl font-bold text-on-surface">Catálogo de Productos</h2>
                                <p class="text-on-surface-variant text-xs mt-1">Control del inventario y existencias en tiempo real.</p>
                            </div>
                            ${isAdmin ? `
                                <button onclick="abrirModalProducto()" class="bg-primary text-on-primary font-bold px-4 py-2 rounded-lg hover:opacity-90 transition-opacity flex items-center gap-2">
                                    <span class="material-symbols-outlined text-sm">add</span> Nuevo Producto
                                </button>
                            ` : ''}
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="productos-list">
                            ${state.productos.map(p => `
                                <div class="bg-[#1c1c1c] border border-outline-variant/40 rounded-xl p-5 hover:border-primary/40 transition-colors flex flex-col justify-between space-y-4">
                                    <div>
                                        <div class="flex justify-between items-start">
                                            <h3 class="font-bold text-lg text-on-surface leading-tight">${p.nombre}</h3>
                                            <span class="font-mono font-bold text-secondary-container text-md">S/ ${parseFloat(p.precio).toFixed(2)}</span>
                                        </div>
                                        <p class="text-on-surface-variant text-xs mt-2 leading-relaxed">${p.descripcion || 'Sin descripción disponible.'}</p>
                                    </div>
                                    <div class="pt-4 border-t border-outline-variant/20 flex justify-between items-center">
                                        <div>
                                            <p class="text-[10px] text-on-surface-variant uppercase tracking-wider font-semibold">Stock Disponible</p>
                                            <p class="font-mono text-base font-bold ${p.stock <= 10 ? 'text-red-400' : 'text-green-400'}">${p.stock} unidades</p>
                                        </div>
                                        <div class="flex gap-2">
                                            ${isAdmin ? `
                                                <button onclick="abrirModalProducto(${p.id})" class="text-on-surface-variant hover:text-primary p-1 transition-colors"><span class="material-symbols-outlined text-sm">edit</span></button>
                                                <button onclick="eliminarProducto(${p.id})" class="text-on-surface-variant hover:text-error p-1 transition-colors"><span class="material-symbols-outlined text-sm">delete</span></button>
                                            ` : `
                                                <button onclick="abrirModalPedido(${p.id})" class="bg-primary/10 hover:bg-primary/20 text-primary text-xs font-bold px-3 py-1.5 rounded transition-all">Pedir</button>
                                            `}
                                        </div>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            } catch (err) {
                container.innerHTML = `<div class="p-4 bg-red-950/20 text-red-200 border border-red-500/30 rounded">Error: ${err.message}</div>`;
            }
        }

        async function realizarBusqueda(q) {
            if (state.currentView !== "productos") return;
            const container = document.getElementById("productos-list");
            if (!container) return;

            try {
                const res = await fetch(`${API_URL}/api/productos/buscar?nombre=${encodeURIComponent(q)}`, { headers: getHeaders() });
                const filtered = res.ok ? await res.json() : [];
                const isAdmin = state.roles.includes("ROLE_ADMIN");

                container.innerHTML = filtered.length === 0 ? `<div class="col-span-full py-8 text-center text-on-surface-variant text-xs">No se encontraron productos con ese nombre.</div>` : filtered.map(p => `
                    <div class="bg-[#1c1c1c] border border-outline-variant/40 rounded-xl p-5 hover:border-primary/40 transition-colors flex flex-col justify-between space-y-4">
                        <div>
                            <div class="flex justify-between items-start">
                                <h3 class="font-bold text-lg text-on-surface leading-tight">${p.nombre}</h3>
                                <span class="font-mono font-bold text-secondary-container text-md">S/ ${parseFloat(p.precio).toFixed(2)}</span>
                            </div>
                            <p class="text-on-surface-variant text-xs mt-2 leading-relaxed">${p.descripcion || 'Sin descripción disponible.'}</p>
                        </div>
                        <div class="pt-4 border-t border-outline-variant/20 flex justify-between items-center">
                            <div>
                                <p class="text-[10px] text-on-surface-variant uppercase tracking-wider font-semibold">Stock Disponible</p>
                                <p class="font-mono text-base font-bold ${p.stock <= 10 ? 'text-red-400' : 'text-green-400'}">${p.stock} unidades</p>
                            </div>
                            <div class="flex gap-2">
                                ${isAdmin ? `
                                    <button onclick="abrirModalProducto(${p.id})" class="text-on-surface-variant hover:text-primary p-1 transition-colors"><span class="material-symbols-outlined text-sm">edit</span></button>
                                    <button onclick="eliminarProducto(${p.id})" class="text-on-surface-variant hover:text-error p-1 transition-colors"><span class="material-symbols-outlined text-sm">delete</span></button>
                                ` : `
                                    <button onclick="abrirModalPedido(${p.id})" class="bg-primary/10 hover:bg-primary/20 text-primary text-xs font-bold px-3 py-1.5 rounded transition-all">Pedir</button>
                                `}
                            </div>
                        </div>
                    </div>
                `).join('');
            } catch (e) {
                console.error(e);
            }
        }

        async function renderPedidos(container) {
            try {
                const res = await fetch(`${API_URL}/api/pedidos`, { headers: getHeaders() });
                state.pedidos = res.ok ? await res.json() : [];

                container.innerHTML = `
                    <div class="max-w-6xl mx-auto space-y-6">
                        <div>
                            <h2 class="text-2xl font-bold text-on-surface">Historial de Pedidos</h2>
                            <p class="text-on-surface-variant text-xs mt-1">Registro cronológico de las compras de productos del inventario.</p>
                        </div>

                        <div class="bg-[#1c1c1c] border border-outline-variant/30 rounded-xl overflow-hidden shadow-lg">
                            <table class="w-full text-left">
                                <thead class="bg-[#242424] border-b border-outline-variant/30 text-xs font-bold uppercase tracking-wider text-on-surface-variant">
                                    <tr>
                                        <th class="px-6 py-4">ID</th>
                                        <th class="px-6 py-4">Empleado/Usuario</th>
                                        <th class="px-6 py-4">Producto</th>
                                        <th class="px-6 py-4 text-center">Cantidad</th>
                                        <th class="px-6 py-4">Fecha</th>
                                        <th class="px-6 py-4 text-right">Total</th>
                                    </tr>
                                </thead>
                                <tbody class="divide-y divide-outline-variant/20 text-xs">
                                    ${state.pedidos.length === 0 ? `
                                        <tr>
                                            <td colspan="6" class="px-6 py-8 text-center text-on-surface-variant">No se han registrado pedidos aún.</td>
                                        </tr>
                                    ` : state.pedidos.map(p => `
                                        <tr class="hover:bg-white/5 transition-colors">
                                            <td class="px-6 py-4 font-mono font-bold text-primary">#${p.id}</td>
                                            <td class="px-6 py-4 font-semibold">${p.usuarioNombre}</td>
                                            <td class="px-6 py-4 font-bold text-on-surface">${p.productoNombre}</td>
                                            <td class="px-6 py-4 text-center font-mono">${p.cantidad} u.</td>
                                            <td class="px-6 py-4 text-on-surface-variant">${new Date(p.fecha).toLocaleString()}</td>
                                            <td class="px-6 py-4 text-right font-mono font-bold text-secondary-container">S/ ${parseFloat(p.total).toFixed(2)}</td>
                                        </tr>
                                    `).join('')}
                                </tbody>
                            </table>
                        </div>
                    </div>
                `;
            } catch (err) {
                container.innerHTML = `<div class="p-4 bg-red-950/20 text-red-200 border border-red-500/30 rounded">Error: ${err.message}</div>`;
            }
        }

        async function renderUsuarios(container) {
            try {
                const res = await fetch(`${API_URL}/usuarios`, { headers: getHeaders() });
                state.usuarios = res.ok ? await res.json() : [];

                container.innerHTML = `
                    <div class="max-w-6xl mx-auto space-y-6">
                        <div class="flex justify-between items-center">
                            <div>
                                <h2 class="text-2xl font-bold text-on-surface">Gestión de Usuarios</h2>
                                <p class="text-on-surface-variant text-xs mt-1">Control de accesos y administración de roles del sistema.</p>
                            </div>
                            <button onclick="abrirModalUsuario()" class="bg-primary text-on-primary font-bold px-4 py-2 rounded-lg hover:opacity-90 transition-opacity flex items-center gap-2">
                                <span class="material-symbols-outlined text-sm">person_add</span> Nuevo Usuario
                            </button>
                        </div>

                        <div class="bg-[#1c1c1c] border border-outline-variant/30 rounded-xl overflow-hidden shadow-lg">
                            <table class="w-full text-left">
                                <thead class="bg-[#242424] border-b border-outline-variant/30 text-xs font-bold uppercase tracking-wider text-on-surface-variant">
                                    <tr>
                                        <th class="px-6 py-4">ID</th>
                                        <th class="px-6 py-4">Username</th>
                                        <th class="px-6 py-4">Nombre Completo</th>
                                        <th class="px-6 py-4">Correo</th>
                                        <th class="px-6 py-4">Roles</th>
                                        <th class="px-6 py-4 text-center">Acciones</th>
                                    </tr>
                                </thead>
                                <tbody class="divide-y divide-outline-variant/20 text-xs">
                                    ${state.usuarios.map(u => `
                                        <tr class="hover:bg-white/5 transition-colors">
                                            <td class="px-6 py-4 font-mono">#${u.id}</td>
                                            <td class="px-6 py-4 font-bold text-primary">${u.username}</td>
                                            <td class="px-6 py-4 font-semibold text-on-surface">${u.nombre}</td>
                                            <td class="px-6 py-4 text-on-surface-variant">${u.correo}</td>
                                            <td class="px-6 py-4">
                                                <span class="inline-flex px-2 py-0.5 rounded text-[10px] font-bold ${u.roles.includes('ROLE_ADMIN') ? 'bg-purple-500/20 text-purple-300' : 'bg-blue-500/20 text-blue-300'}">
                                                    ${u.roles.includes('ROLE_ADMIN') ? 'ADMIN' : 'USER (Empleado)'}
                                                </span>
                                            </td>
                                            <td class="px-6 py-4 text-center space-x-2">
                                                <button onclick="abrirModalUsuario(${u.id})" class="text-on-surface-variant hover:text-primary"><span class="material-symbols-outlined text-[18px]">edit</span></button>
                                                <button onclick="eliminarUsuario(${u.id})" class="text-on-surface-variant hover:text-error"><span class="material-symbols-outlined text-[18px]">delete</span></button>
                                            </td>
                                        </tr>
                                    `).join('')}
                                </tbody>
                            </table>
                        </div>
                    </div>
                `;
            } catch (err) {
                container.innerHTML = `<div class="p-4 bg-red-950/20 text-red-200 border border-red-500/30 rounded">Error: ${err.message}</div>`;
            }
        }

        function abrirModalProducto(id = null) {
            const prod = id ? state.productos.find(p => p.id === id) : null;
            const modal = document.getElementById("modal-container");

            modal.innerHTML = `
                <div class="w-full max-w-md bg-surface-container border border-outline-variant p-6 rounded-xl space-y-4">
                    <h3 class="text-lg font-bold text-primary">${prod ? 'Editar Producto' : 'Agregar Nuevo Producto'}</h3>
                    <form id="modal-producto-form" class="space-y-3">
                        <div>
                            <label class="block text-[11px] font-bold uppercase tracking-wider text-on-surface-variant mb-1">Nombre</label>
                            <input type="text" id="m-p-nombre" required class="w-full bg-[#161616] border border-outline-variant rounded p-2 text-xs focus:ring-1 focus:ring-primary text-on-surface" value="${prod ? prod.nombre : ''}"/>
                        </div>
                        <div>
                            <label class="block text-[11px] font-bold uppercase tracking-wider text-on-surface-variant mb-1">Descripción</label>
                            <textarea id="m-p-desc" class="w-full bg-[#161616] border border-outline-variant rounded p-2 text-xs focus:ring-1 focus:ring-primary text-on-surface" rows="2">${prod ? prod.descripcion : ''}</textarea>
                        </div>
                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <label class="block text-[11px] font-bold uppercase tracking-wider text-on-surface-variant mb-1">Precio (S/)</label>
                                <input type="number" step="0.01" id="m-p-precio" required class="w-full bg-[#161616] border border-outline-variant rounded p-2 text-xs focus:ring-1 focus:ring-primary text-on-surface" value="${prod ? prod.precio : ''}"/>
                            </div>
                            <div>
                                <label class="block text-[11px] font-bold uppercase tracking-wider text-on-surface-variant mb-1">Stock</label>
                                <input type="number" id="m-p-stock" required class="w-full bg-[#161616] border border-outline-variant rounded p-2 text-xs focus:ring-1 focus:ring-primary text-on-surface" value="${prod ? prod.stock : ''}"/>
                            </div>
                        </div>
                        <div class="flex justify-end gap-2 pt-4">
                            <button type="button" onclick="cerrarModal()" class="border border-outline-variant/65 text-on-surface-variant px-4 py-2 rounded text-xs hover:bg-white/5 transition-colors">Cancelar</button>
                            <button type="submit" class="bg-primary text-on-primary font-bold px-4 py-2 rounded text-xs hover:opacity-90">Guardar</button>
                        </div>
                    </form>
                </div>
            `;
            modal.classList.remove("hidden");

            document.getElementById("modal-producto-form").addEventListener("submit", async (e) => {
                e.preventDefault();
                const data = {
                    nombre: document.getElementById("m-p-nombre").value,
                    descripcion: document.getElementById("m-p-desc").value,
                    precio: parseFloat(document.getElementById("m-p-precio").value),
                    stock: parseInt(document.getElementById("m-p-stock").value)
                };

                const url = prod ? `${API_URL}/admin/productos/${prod.id}` : `${API_URL}/admin/productos`;
                const method = prod ? "PUT" : "POST";

                const res = await fetch(url, {
                    method: method,
                    headers: getHeaders(),
                    body: JSON.stringify(data)
                });

                if (res.ok) {
                    cerrarModal();
                    renderView("productos");
                } else {
                    alert("Error al guardar el producto.");
                }
            });
        }

        async function eliminarProducto(id) {
            if (!confirm("¿Está seguro de eliminar este producto? (Se dará de baja lógica)")) return;
            const res = await fetch(`${API_URL}/admin/productos/${id}`, {
                method: "DELETE",
                headers: getHeaders()
            });
            if (res.ok) {
                renderView("productos");
            } else {
                alert("Error al eliminar el producto.");
            }
        }

        function abrirModalPedido(id) {
            const prod = state.productos.find(p => p.id === id);
            const modal = document.getElementById("modal-container");

            modal.innerHTML = `
                <div class="w-full max-w-sm bg-surface-container border border-outline-variant p-6 rounded-xl space-y-4">
                    <h3 class="text-lg font-bold text-primary">Registrar Pedido</h3>
                    <p class="text-xs text-on-surface-variant">Producto: <b class="text-on-surface">${prod.nombre}</b> (Stock: ${prod.stock} u.)</p>
                    <form id="modal-pedido-form" class="space-y-3">
                        <div>
                            <label class="block text-[11px] font-bold uppercase tracking-wider text-on-surface-variant mb-1">Cantidad a Comprar</label>
                            <input type="number" id="m-o-cantidad" min="1" max="${prod.stock}" required class="w-full bg-[#161616] border border-outline-variant rounded p-2 text-xs focus:ring-1 focus:ring-primary text-on-surface" value="1"/>
                        </div>
                        <div class="flex justify-end gap-2 pt-4">
                            <button type="button" onclick="cerrarModal()" class="border border-outline-variant/65 text-on-surface-variant px-4 py-2 rounded text-xs hover:bg-white/5 transition-colors">Cancelar</button>
                            <button type="submit" class="bg-primary text-on-primary font-bold px-4 py-2 rounded text-xs hover:opacity-90">Registrar Venta</button>
                        </div>
                    </form>
                </div>
            `;
            modal.classList.remove("hidden");

            document.getElementById("modal-pedido-form").addEventListener("submit", async (e) => {
                e.preventDefault();
                const cant = parseInt(document.getElementById("m-o-cantidad").value);
                const data = {
                    productoId: prod.id,
                    cantidad: cant
                };

                const res = await fetch(`${API_URL}/api/pedidos`, {
                    method: "POST",
                    headers: getHeaders(),
                    body: JSON.stringify(data)
                });

                if (res.ok) {
                    cerrarModal();
                    renderView("productos");
                } else {
                    const err = await res.json();
                    alert("Error: " + (err.message || "No se pudo registrar el pedido."));
                }
            });
        }

        function abrirModalUsuario(id = null) {
            const u = id ? state.usuarios.find(user => user.id === id) : null;
            const modal = document.getElementById("modal-container");

            modal.innerHTML = `
                <div class="w-full max-w-md bg-surface-container border border-outline-variant p-6 rounded-xl space-y-4">
                    <h3 class="text-lg font-bold text-primary">${u ? 'Editar Usuario' : 'Registrar Nuevo Usuario'}</h3>
                    <form id="modal-usuario-form" class="space-y-3">
                        <div>
                            <label class="block text-[11px] font-bold uppercase tracking-wider text-on-surface-variant mb-1">Nombre Completo</label>
                            <input type="text" id="m-u-nombre" required class="w-full bg-[#161616] border border-outline-variant rounded p-2 text-xs focus:ring-1 focus:ring-primary text-on-surface" value="${u ? u.nombre : ''}"/>
                        </div>
                        <div>
                            <label class="block text-[11px] font-bold uppercase tracking-wider text-on-surface-variant mb-1">Correo Electrónico</label>
                            <input type="email" id="m-u-correo" required class="w-full bg-[#161616] border border-outline-variant rounded p-2 text-xs focus:ring-1 focus:ring-primary text-on-surface" value="${u ? u.correo : ''}"/>
                        </div>
                        <div>
                            <label class="block text-[11px] font-bold uppercase tracking-wider text-on-surface-variant mb-1">Username</label>
                            <input type="text" id="m-u-username" required ${u ? 'readonly' : ''} class="w-full bg-[#161616] border border-outline-variant rounded p-2 text-xs focus:ring-1 focus:ring-primary text-on-surface ${u ? 'opacity-50' : ''}" value="${u ? u.username : ''}"/>
                        </div>
                        <div>
                            <label class="block text-[11px] font-bold uppercase tracking-wider text-on-surface-variant mb-1">Password ${u ? '(Dejar vacío para mantener actual)' : ''}</label>
                            <input type="password" id="m-u-pass" ${u ? '' : 'required'} class="w-full bg-[#161616] border border-outline-variant rounded p-2 text-xs focus:ring-1 focus:ring-primary text-on-surface"/>
                        </div>
                        <div>
                            <label class="block text-[11px] font-bold uppercase tracking-wider text-on-surface-variant mb-1">Rol</label>
                            <select id="m-u-rol" class="w-full bg-[#161616] border border-outline-variant rounded p-2 text-xs focus:ring-1 focus:ring-primary text-on-surface">
                                <option value="ROLE_USER" ${u && u.roles.includes('ROLE_USER') ? 'selected' : ''}>USER (Empleado)</option>
                                <option value="ROLE_ADMIN" ${u && u.roles.includes('ROLE_ADMIN') ? 'selected' : ''}>ADMIN (Administrador)</option>
                            </select>
                        </div>
                        <div class="flex justify-end gap-2 pt-4">
                            <button type="button" onclick="cerrarModal()" class="border border-outline-variant/65 text-on-surface-variant px-4 py-2 rounded text-xs hover:bg-white/5 transition-colors">Cancelar</button>
                            <button type="submit" class="bg-primary text-on-primary font-bold px-4 py-2 rounded text-xs hover:opacity-90">Guardar</button>
                        </div>
                    </form>
                </div>
            `;
            modal.classList.remove("hidden");

            document.getElementById("modal-usuario-form").addEventListener("submit", async (e) => {
                e.preventDefault();
                const data = {
                    nombre: document.getElementById("m-u-nombre").value,
                    correo: document.getElementById("m-u-correo").value,
                    username: document.getElementById("m-u-username").value,
                    password: document.getElementById("m-u-pass").value,
                    roles: [document.getElementById("m-u-rol").value]
                };

                const url = u ? `${API_URL}/usuarios/${u.id}` : `${API_URL}/usuarios`;
                const method = u ? "PUT" : "POST";

                const res = await fetch(url, {
                    method: method,
                    headers: getHeaders(),
                    body: JSON.stringify(data)
                });

                if (res.ok) {
                    cerrarModal();
                    renderView("usuarios");
                } else {
                    const err = await res.json();
                    alert("Error: " + (err.message || "No se pudo guardar el usuario."));
                }
            });
        }

        async function eliminarUsuario(id) {
            if (!confirm("¿Está seguro de eliminar este usuario?")) return;
            const res = await fetch(`${API_URL}/usuarios/${id}`, {
                method: "DELETE",
                headers: getHeaders()
            });
            if (res.ok) {
                renderView("usuarios");
            } else {
                alert("Error al eliminar el usuario.");
            }
        }

        function cerrarModal() {
            const modal = document.getElementById("modal-container");
            modal.classList.add("hidden");
            modal.innerHTML = "";
        }
    </script>
</body>
</html>
